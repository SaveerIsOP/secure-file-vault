{% extends "base.html" %}
{% block title %}Register — SecureVault{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-12 col-sm-10 col-md-7 col-lg-5">

    <div class="text-center mb-4">
      <div style="font-size:3.5rem; color:#3b82f6;">
        <i class="bi bi-person-plus-fill"></i>
      </div>
      <h1 class="fw-bold mt-2 mb-1" style="font-size:1.8rem;">Create account</h1>
      <p style="color:var(--sv-muted);">Start backing up your files securely</p>
    </div>

    <div class="card p-4">
      <form method="POST" action="{{ url_for('register') }}" novalidate>
        <div class="mb-3">
          <label for="username" class="form-label fw-bold" style="color:#ffffff;">Username</label>
          <div class="input-group">
            <span class="input-group-text" style="background:var(--sv-dark);border-color:var(--sv-border);color:var(--sv-muted);">
              <i class="bi bi-person"></i>
            </span>
            <input type="text" class="form-control" id="username" name="username"
                   placeholder="Username" required autocomplete="username" minlength="3">
          </div>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label fw-bold" style="color:#ffffff;">Password</label>
          <div class="input-group">
            <span class="input-group-text" style="background:var(--sv-dark);border-color:var(--sv-border);color:var(--sv-muted);">
              <i class="bi bi-lock"></i>
            </span>
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="Password" required autocomplete="new-password" minlength="6">
          </div>
        </div>
        <div class="mb-4">
          <label for="confirm_password" class="form-label fw-bold" style="color:#ffffff;">Confirm password</label>
          <div class="input-group">
            <span class="input-group-text" style="background:var(--sv-dark);border-color:var(--sv-border);color:var(--sv-muted);">
              <i class="bi bi-lock-fill"></i>
            </span>
            <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                   placeholder="Confirm Password" required autocomplete="new-password">
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">
          <i class="bi bi-person-check me-2"></i>Create Account
        </button>
      </form>
    </div>

    <p class="text-center mt-3" style="color:var(--sv-muted);">
      Already have an account?
      <a href="{{ url_for('login') }}" class="text-decoration-none" style="color:#3b82f6;">Sign in</a>
    </p>

  </div>
</div>
{% endblock %}
